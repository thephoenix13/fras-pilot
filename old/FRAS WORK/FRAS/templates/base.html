<!-- templates/base.html -->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FRAS — Face Recognition Attendance</title>
    <link href="https://stackpath.bootstrapcdn.com/bootstrap/4.3.1/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <a class="navbar-brand" href="{% url 'index' %}">FRAS</a>
        <div class="collapse navbar-collapse">
            <ul class="navbar-nav mr-auto">
                <li class="nav-item"><a class="nav-link" href="{% url 'upload_images' %}">Enroll Student</a></li>
                <li class="nav-item"><a class="nav-link" href="{% url 'webcam_template' %}">Webcam Recognition</a></li>
                <li class="nav-item"><a class="nav-link" href="{% url 'videofacerecog' %}">Video / Image</a></li>
                <li class="nav-item"><a class="nav-link" href="{% url 'start_attendance' %}">Start Attendance</a></li>
                <li class="nav-item"><a class="nav-link" href="{% url 'attendance_dashboard' %}">Attendance Records</a></li>
            </ul>
        </div>
    </nav>

    <div class="container mt-4">
        {% if messages %}
            {% for m in messages %}
                <div class="alert alert-{{ m.tags|default:'info' }}">{{ m }}</div>
            {% endfor %}
        {% endif %}

        {% block content %}{% endblock %}
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/popper.js/1.14.7/umd/popper.min.js"></script>
    <script src="https://stackpath.bootstrapcdn.com/bootstrap/4.3.1/js/bootstrap.min.js"></script>
</body>
</html>
