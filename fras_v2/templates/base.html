<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FRAS — {% block title %}Home{% endblock %}</title>
    <style>
        :root {
            --bg:           #f5f7fa;
            --surface:      #ffffff;
            --border:       #e4e7eb;
            --ink:          #1a202c;
            --ink-soft:     #4a5568;
            --ink-muted:    #718096;
            --primary:      #2563eb;
            --primary-dark: #1e40af;
            --success:      #16a34a;
            --warn:         #d97706;
            --danger:       #dc2626;
            --accent:       #7c3aed;
        }
        * { box-sizing: border-box; }
        body {
            margin: 0;
            font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Text', 'Segoe UI', sans-serif;
            background: var(--bg);
            color: var(--ink);
            line-height: 1.55;
        }
        .nav {
            background: var(--surface);
            border-bottom: 1px solid var(--border);
            padding: 14px 32px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            position: sticky;
            top: 0;
            z-index: 50;
        }
        .nav-brand {
            font-weight: 700;
            font-size: 1.15rem;
            color: var(--ink);
            text-decoration: none;
            letter-spacing: -0.01em;
        }
        .nav-brand span { color: var(--primary); }
        .nav-links { display: flex; gap: 22px; }
        .nav-links a {
            color: var(--ink-soft);
            text-decoration: none;
            font-size: 0.92rem;
            font-weight: 500;
            transition: color 0.15s;
        }
        .nav-links a:hover { color: var(--primary); }
        .nav-links a.active { color: var(--primary); }

        .container { max-width: 1180px; margin: 0 auto; padding: 28px 32px; }

        .card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 28px;
            margin-bottom: 20px;
        }

        h1 { font-size: 1.8rem; margin: 0 0 12px; letter-spacing: -0.02em; }
        h2 { font-size: 1.35rem; margin: 0 0 16px; letter-spacing: -0.01em; }
        h3 { font-size: 1.05rem; margin: 0 0 12px; color: var(--ink-soft); }

        .subtitle { color: var(--ink-muted); margin-bottom: 18px; font-size: 0.95rem; }

        .btn {
            display: inline-block;
            background: var(--primary);
            color: white;
            border: none;
            padding: 10px 18px;
            border-radius: 7px;
            font-size: 0.92rem;
            font-weight: 500;
            cursor: pointer;
            text-decoration: none;
            transition: background 0.15s;
        }
        .btn:hover { background: var(--primary-dark); }
        .btn-secondary {
            background: var(--surface);
            color: var(--ink);
            border: 1px solid var(--border);
        }
        .btn-secondary:hover { background: var(--bg); }
        .btn-success { background: var(--success); }
        .btn-success:hover { background: #15803d; }
        .btn-danger { background: var(--danger); }
        .btn-danger:hover { background: #b91c1c; }
        .btn-sm { padding: 6px 12px; font-size: 0.85rem; }

        .form-group { margin-bottom: 16px; }
        label { display: block; font-weight: 500; font-size: 0.9rem; margin-bottom: 6px; color: var(--ink-soft); }
        input[type="text"], input[type="file"], select, textarea {
            width: 100%;
            padding: 10px 12px;
            border: 1px solid var(--border);
            border-radius: 7px;
            font-size: 0.95rem;
            font-family: inherit;
            background: var(--surface);
        }
        input:focus, select:focus, textarea:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.1);
        }
        .help { font-size: 0.8rem; color: var(--ink-muted); margin-top: 4px; }

        .grid-cards {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
            gap: 18px;
        }
        .feature-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 22px;
            text-decoration: none;
            color: var(--ink);
            transition: all 0.15s;
            display: block;
        }
        .feature-card:hover {
            border-color: var(--primary);
            transform: translateY(-2px);
            box-shadow: 0 6px 16px rgba(0,0,0,0.06);
        }
        .feature-card .icon { font-size: 1.8rem; margin-bottom: 10px; }
        .feature-card .title { font-weight: 600; font-size: 1.05rem; margin-bottom: 4px; }
        .feature-card .desc { font-size: 0.88rem; color: var(--ink-muted); }

        .stat-row { display: flex; gap: 20px; margin: 16px 0 24px; }
        .stat {
            flex: 1;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 14px 18px;
        }
        .stat-num { font-size: 1.6rem; font-weight: 700; color: var(--ink); }
        .stat-label { font-size: 0.8rem; color: var(--ink-muted); text-transform: uppercase; letter-spacing: 0.05em; }

        table { width: 100%; border-collapse: collapse; font-size: 0.9rem; }
        th, td { padding: 10px 12px; text-align: left; border-bottom: 1px solid var(--border); }
        th {
            background: #f8fafc;
            font-weight: 600;
            font-size: 0.78rem;
            text-transform: uppercase;
            letter-spacing: 0.04em;
            color: var(--ink-soft);
        }
        tr:hover td { background: #fafbfc; }

        .badge {
            display: inline-block;
            padding: 3px 10px;
            border-radius: 12px;
            font-size: 0.78rem;
            font-weight: 600;
        }
        .badge-running { background: #dbeafe; color: #1e40af; }
        .badge-pending { background: #fef3c7; color: #92400e; }
        .badge-completed { background: #d1fae5; color: #065f46; }
        .badge-failed { background: #fee2e2; color: #991b1b; }
        .badge-stopped { background: #e5e7eb; color: #374151; }
        .badge-present { background: #d1fae5; color: #065f46; }
        .badge-absent { background: #fee2e2; color: #991b1b; }

        .alert {
            padding: 12px 16px;
            border-radius: 7px;
            margin-bottom: 16px;
            font-size: 0.92rem;
        }
        .alert-info { background: #eff6ff; color: #1e3a8a; border: 1px solid #bfdbfe; }
        .alert-success { background: #f0fdf4; color: #14532d; border: 1px solid #bbf7d0; }
        .alert-warning { background: #fffbeb; color: #78350f; border: 1px solid #fde68a; }
        .alert-danger { background: #fef2f2; color: #7f1d1d; border: 1px solid #fecaca; }

        pre.log {
            background: #0f172a;
            color: #cbd5e1;
            padding: 16px;
            border-radius: 8px;
            font-family: 'SF Mono', Monaco, Consolas, monospace;
            font-size: 0.82rem;
            max-height: 360px;
            overflow-y: auto;
            white-space: pre-wrap;
            line-height: 1.5;
        }
        .footer {
            text-align: center;
            color: var(--ink-muted);
            font-size: 0.82rem;
            padding: 30px 0;
        }
    </style>
</head>
<body>
    <nav class="nav">
        <a href="{% url 'home' %}" class="nav-brand">FRAS<span>·</span>Pilot</a>
        <div class="nav-links">
            <a href="{% url 'home' %}">Home</a>
            <a href="{% url 'upload_students' %}">Students</a>
            <a href="{% url 'start_session' %}">New Session</a>
            <a href="{% url 'all_sessions' %}">All Sessions</a>
        </div>
    </nav>

    <div class="container">
        {% if messages %}
            {% for message in messages %}
                <div class="alert alert-{{ message.tags|default:'info' }}">{{ message }}</div>
            {% endfor %}
        {% endif %}
        {% block content %}{% endblock %}
        <div class="footer">FRAS Pilot v2 — Face Recognition Attendance System</div>
    </div>
</body>
</html>
