{% extends "base.html" %}
{% block title %}— Enroll Student{% endblock %}
{% block content %}
<div class="card" style="max-width: 600px;">
  <h2 style="margin-bottom: 20px;">Enroll Student</h2>
  <form method="post" enctype="multipart/form-data">
    {% csrf_token %}
    {% for field in form %}
    <div class="form-group">
      <label>{{ field.label }}{% if field.field.required %} <span style="color:#e53e3e;">*</span>{% endif %}</label>
      {{ field }}
      {% if field.errors %}<div class="field-error">{{ field.errors.0 }}</div>{% endif %}
    </div>
    {% endfor %}
    <div style="display:flex; gap:12px; margin-top:24px;">
      <button type="submit">Enroll</button>
      <a href="{% url 'home' %}" class="btn-secondary">Cancel</a>
    </div>
  </form>
</div>
{% endblock %}
